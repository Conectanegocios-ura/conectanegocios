<title>CRM Leads — Conecta Tech</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0D1117; --surface:#131C2B; --surface2:#1A2540;
    --border:#1E2D45; --border2:#263550; --text:#C8D4E8;
    --muted:#5A6E8C; --accent:#3D7EF5; --accent-dim:#1E3A7A;
    --s-novo:#5A6E8C; --s-contato:#F5A623; --s-qualificado:#3D7EF5;
    --s-negociando:#A855F7; --s-fechado:#10B981; --s-descartado:#EF4444;
    --s-contato_feito:#F5A623; --s-oferta_apresentada:#3D7EF5;
    --s-upgrade_aceito:#10B981; --s-retornou:#10B981;
    --s-recusou:#EF4444; --s-reagendar:#A855F7;
  }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; font-size:14px; line-height:1.5; }

  /* ── Login ── */
  #login-screen { position:fixed; inset:0; background:#F4F6FA; display:flex; align-items:center; justify-content:center; z-index:200; }
  #login-screen.hidden { display:none; }
  .login-wrap { display:flex; flex-direction:column; align-items:center; gap:28px; }
  .login-brand { display:flex; flex-direction:column; align-items:center; gap:0; }
  .login-box { background:#fff; border:1px solid #E2E8F2; border-radius:14px; padding:36px 44px; width:360px; display:flex; flex-direction:column; align-items:center; gap:18px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .login-title { font-size:20px; font-weight:700; text-align:center; line-height:1.2; color:#0D1A3A; }
  .login-sub { font-size:13px; color:#6B7FA3; text-align:center; }
  .google-btn { display:flex; align-items:center; gap:12px; width:100%; background:#fff; color:#1a1a1a; border:1.5px solid #D0D8E8; border-radius:8px; padding:12px 20px; font-size:14px; font-weight:600; cursor:pointer; transition:box-shadow .15s,border-color .15s; }
  .google-btn:hover { box-shadow:0 2px 12px rgba(0,0,0,.12); border-color:#3D7EF5; }
  .google-btn svg { width:20px; height:20px; flex-shrink:0; }
  .login-disclaimer { font-size:11px; color:#9BADC4; text-align:center; line-height:1.5; }

  /* ── Relatórios ── */
  #reports-overlay { display:none; position:fixed; inset:0; background:rgba(7,17,31,.7); z-index:150; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; }
  #reports-overlay.open { display:flex; }
  .reports-panel { background:var(--surface); border:1px solid var(--border2); border-radius:14px; width:100%; max-width:920px; padding:32px 36px; }
  .rp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
  .rp-title { font-size:18px; font-weight:700; color:var(--text); }
  .rp-close { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; padding:4px 8px; border-radius:4px; }
  .rp-close:hover { background:var(--surface2); color:var(--text); }
  .rp-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .rp-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:20px; }
  .rp-card-title { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:16px; }
  .rp-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .rp-bar-label { font-size:12px; color:var(--text); min-width:110px; }
  .rp-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .rp-bar-fill { height:100%; border-radius:4px; transition:width .4s; }
  .rp-bar-count { font-size:12px; font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; min-width:28px; text-align:right; }
  .rp-vendor-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .rp-vendor-row:last-child { border-bottom:none; }
  .rp-vendor-name { font-weight:600; color:var(--text); }
  .rp-vendor-sub { font-size:11px; color:var(--muted); margin-top:1px; }
  .rp-overdue-row { display:flex; flex-direction:column; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .rp-overdue-row:last-child { border-bottom:none; }
  .rp-overdue-row:hover { opacity:.8; }
  .rp-overdue-name { font-size:13px; font-weight:600; color:#EF4444; }
  .rp-overdue-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .rp-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .rp-summary-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; text-align:center; }
  .reports-btn { background:var(--surface2); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer; font-weight:500; }
  .reports-btn:hover { border-color:var(--accent); color:var(--accent); }
  .janela-row { display:flex; flex-direction:column; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .janela-row:last-child { border-bottom:none; }
  .janela-row:hover { opacity:.8; }
  .janela-nome { font-size:13px; font-weight:600; color:#F5A623; }
  .janela-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── Layout ── */
  #app { display:grid; grid-template-rows:48px 1fr; height:100vh; overflow:hidden; }
  header { background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; padding:0 20px; }
  header h1 { font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  .user-chip { display:flex; align-items:center; gap:8px; }
  .user-chip img { width:26px; height:26px; border-radius:50%; border:1px solid var(--border2); }
  .user-chip span { font-size:12px; font-weight:600; color:var(--text); }
  .logout-btn { font-size:11px; color:var(--muted); background:none; border:none; cursor:pointer; margin-left:4px; }
  .logout-btn:hover { color:#EF4444; }
  header .stats { display:flex; gap:20px; margin-left:auto; }
  .stat { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .stat strong { color:var(--text); font-size:15px; font-weight:600; }
  .stat .dot { width:7px; height:7px; border-radius:50%; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:#10B981; display:inline-block; }
  .sync-dot.syncing { background:var(--s-contato); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  #main { display:grid; grid-template-columns:340px 1fr; overflow:hidden; }

  /* ── List ── */
  #list-panel { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
  #list-toolbar { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
  #search { background:var(--surface2); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:7px 10px; font-size:13px; width:100%; outline:none; }
  #search:focus { border-color:var(--accent); }
  #search::placeholder { color:var(--muted); }
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-btn { font-size:11px; padding:3px 9px; border-radius:4px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; }
  .filter-btn:hover { border-color:var(--accent); color:var(--text); }
  .filter-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .filter-btn.origem-google.active { background:rgba(61,126,245,.15); border-color:#3D7EF5; color:#3D7EF5; }
  .filter-btn.origem-refid.active { background:rgba(16,185,129,.15); border-color:#10B981; color:#10B981; }
  .filter-btn.origem-winback.active { background:rgba(245,166,35,.15); border-color:#F5A623; color:#F5A623; }
  .filter-btn.tempo-janela.active { background:rgba(245,166,35,.2); border-color:#F5A623; color:#F5A623; }
  #load-btn { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:7px 14px; font-size:13px; cursor:pointer; font-weight:500; white-space:nowrap; }
  #mailing-btn { background:#10B981; color:#fff; border:none; border-radius:6px; padding:7px 14px; font-size:13px; cursor:pointer; font-weight:500; white-space:nowrap; }
  #lead-list { overflow-y:auto; flex:1; }
  #lead-list::-webkit-scrollbar { width:4px; }
  #lead-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .lead-card { padding:12px 14px 12px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; border-left:3px solid transparent; }
  .lead-card:hover { background:var(--surface2); }
  .lead-card.selected { background:var(--surface2); }
  .lead-card .lc-name { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lead-card .lc-sub { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lc-badge { font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:2px 7px; border-radius:3px; display:inline-block; }
  .lc-date { font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .lc-date.overdue { color:#EF4444; } .lc-date.today { color:var(--s-contato); }
  .lc-owner { font-size:10px; color:#10B981; margin-top:2px; font-weight:600; }
  .urgency-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:2px 8px; border-radius:3px; background:rgba(245,166,35,.2); color:#F5A623; border:1px solid rgba(245,166,35,.4); margin-top:4px; }
  .origem-tag { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:1px 6px; border-radius:3px; display:inline-block; margin-right:5px; }
  .origem-tag.google { background:rgba(61,126,245,.15); color:#3D7EF5; }
  .origem-tag.refidelizacao { background:rgba(16,185,129,.15); color:#10B981; }
  .origem-tag.winback { background:rgba(245,166,35,.15); color:#F5A623; }
  .status-novo{border-left-color:var(--s-novo)} .status-contato{border-left-color:var(--s-contato)}
  .status-qualificado{border-left-color:var(--s-qualificado)} .status-negociando{border-left-color:var(--s-negociando)}
  .status-fechado{border-left-color:var(--s-fechado)} .status-descartado{border-left-color:var(--s-descartado)}
  .status-contato_feito{border-left-color:var(--s-contato_feito)} .status-oferta_apresentada{border-left-color:var(--s-oferta_apresentada)}
  .status-upgrade_aceito{border-left-color:var(--s-upgrade_aceito)} .status-retornou{border-left-color:var(--s-retornou)}
  .status-recusou{border-left-color:var(--s-recusou)} .status-reagendar{border-left-color:var(--s-reagendar)}
  .badge-novo{background:rgba(90,110,140,.2);color:var(--s-novo)} .badge-contato{background:rgba(245,166,35,.15);color:var(--s-contato)}
  .badge-qualificado{background:rgba(61,126,245,.15);color:var(--s-qualificado)} .badge-negociando{background:rgba(168,85,247,.15);color:var(--s-negociando)}
  .badge-fechado{background:rgba(16,185,129,.15);color:var(--s-fechado)} .badge-descartado{background:rgba(239,68,68,.15);color:var(--s-descartado)}
  .badge-contato_feito{background:rgba(245,166,35,.15);color:var(--s-contato_feito)}
  .badge-oferta_apresentada{background:rgba(61,126,245,.15);color:var(--s-oferta_apresentada)}
  .badge-upgrade_aceito{background:rgba(16,185,129,.15);color:var(--s-upgrade_aceito)}
  .badge-retornou{background:rgba(16,185,129,.15);color:var(--s-retornou)}
  .badge-recusou{background:rgba(239,68,68,.15);color:var(--s-recusou)}
  .badge-reagendar{background:rgba(168,85,247,.15);color:var(--s-reagendar)}

  /* ── Detail ── */
  #detail-panel { overflow-y:auto; padding:28px 32px; }
  #detail-panel::-webkit-scrollbar { width:4px; }
  #detail-panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .detail-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:24px; }
  .detail-name { font-size:22px; font-weight:700; line-height:1.2; text-wrap:balance; }
  .detail-cat { font-size:13px; color:var(--muted); margin-top:4px; }
  .status-select { background:var(--surface2); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; cursor:pointer; outline:none; flex-shrink:0; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:24px; }
  .info-cell { background:var(--surface); padding:12px 16px; }
  .info-cell .label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
  .info-cell .value { font-size:13px; word-break:break-word; }
  .info-cell .value a { color:var(--accent); text-decoration:none; }
  .stars { color:#F5A623; }
  .section-title { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:10px; }
  textarea { width:100%; background:var(--surface2); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:10px 12px; font-size:13px; line-height:1.6; resize:vertical; min-height:100px; outline:none; font-family:inherit; }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--muted); }
  .activity-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .activity-item:last-child { border-bottom:none; }
  .activity-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; margin-top:5px; }
  .activity-text { font-size:12px; color:var(--muted); }
  .activity-text strong { color:var(--text); }
  .activity-time { font-size:11px; color:var(--muted); margin-top:2px; }
  .save-btn { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer; margin-top:12px; }
  .save-btn:hover { opacity:.85; }
  .no-leads { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }
  #file-input,#mailing-input { display:none; }
  .vel-badge { display:inline-flex; align-items:center; font-size:13px; font-weight:700; padding:3px 10px; border-radius:5px; background:rgba(61,126,245,.15); color:#3D7EF5; }
  .vel-badge.alta { background:rgba(16,185,129,.15); color:#10B981; }
  .vel-badge.baixa { background:rgba(239,68,68,.15); color:#EF4444; }
  .mailing-banner { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:14px 18px; margin-bottom:20px; display:flex; align-items:center; gap:14px; }
  .mailing-banner-icon { font-size:22px; flex-shrink:0; }
  .mailing-banner-title { font-size:13px; font-weight:700; color:var(--text); }
  .mailing-banner-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  input[type="tel"] { background:var(--surface); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:7px 10px; font-size:13px; outline:none; width:100%; }
  input[type="tel"]:focus { border-color:var(--accent); }

  /* ── Next contact ── */
  .next-contact-block { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:16px 18px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .next-contact-block.required { border-color:#EF4444; box-shadow:0 0 0 1px rgba(239,68,68,.3); }
  .nc-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
  .nc-hint { font-size:11px; color:#EF4444; margin-top:4px; display:none; }
  .next-contact-block.required .nc-hint { display:block; }
  input[type="date"] { background:var(--surface); border:1px solid var(--border2); color:var(--text); border-radius:6px; padding:7px 10px; font-size:13px; outline:none; color-scheme:dark; cursor:pointer; }

  /* ── WhatsApp ── */
  .wa-block { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:14px 18px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .wa-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:3px; }
  .wa-status { font-size:12px; }
  .wa-status.confirmed{color:#10B981} .wa-status.landline,.wa-status.no-phone{color:var(--muted)} .wa-status.pending{color:var(--s-contato)}
  .wa-actions { display:flex; align-items:center; gap:10px; }
  .wa-toggle { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }
  .wa-toggle input[type="checkbox"] { accent-color:#25D366; width:14px; height:14px; cursor:pointer; }
  .wa-btn { display:inline-flex; align-items:center; gap:7px; background:#25D366; color:#fff; border:none; border-radius:6px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; }
  .wa-btn:hover { opacity:.85; }
  .wa-btn.disabled { background:var(--border2); color:var(--muted); cursor:not-allowed; pointer-events:none; }
  .wa-icon { width:16px; height:16px; fill:currentColor; flex-shrink:0; }

  /* ── Aposse ── */
  .aposse-block { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:16px 18px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .aposse-block.owned-me { border-color:#10B981; } .aposse-block.owned-other { border-color:var(--s-negociando); }
  .ap-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
  .ap-status { font-size:13px; font-weight:600; }
  .ap-status.free{color:var(--muted)} .ap-status.mine{color:#10B981} .ap-status.other{color:var(--s-negociando)}
  .ap-hint { font-size:11px; color:var(--muted); margin-top:3px; }
  .aposse-btn { background:#10B981; color:#fff; border:none; border-radius:6px; padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .aposse-btn:hover { opacity:.85; }
  .aposse-btn:disabled { background:var(--border2); color:var(--muted); cursor:not-allowed; }

  /* ── Cobertura badge ── */
  .cob-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:4px; }
  .cob-DISPONIVEL { background:rgba(16,185,129,.15); color:#10B981; }
  .cob-SEM_COBERTURA { background:rgba(239,68,68,.15); color:#EF4444; }
  .cob-SEM_CAPACIDADE { background:rgba(245,166,35,.15); color:#F5A623; }

  /* ── Toast ── */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(8px); background:#EF4444; color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:999; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.green { background:#10B981; }
</style>

<!-- Login -->
<div id="login-screen">

// ── Helpers de tempo ──
function mesesDesdeAtivacao(lead) {
  if (!lead.contrato_ativacao) return null;
  const ativ = new Date(lead.contrato_ativacao);
  if (isNaN(ativ)) return null;
  const hoje = new Date();
  return (hoje.getFullYear() - ativ.getFullYear()) * 12 + (hoje.getMonth() - ativ.getMonth());
}
function faixaTempo(meses) {
  if (meses === null) return null;
  if (meses >= 9 && meses <= 11) return 'janela';
  if (meses >= 12 && meses < 24) return '1-2anos';
  if (meses >= 24 && meses < 60) return '2-5anos';
  if (meses >= 60) return '5mais';
  return null;
}
function diasParaJanela(lead) {
  if (!lead.contrato_ativacao) return null;
  const ativ = new Date(lead.contrato_ativacao);
  if (isNaN(ativ)) return null;
  const hoje = new Date();
  const meses = (hoje.getFullYear() - ativ.getFullYear()) * 12 + (hoje.getMonth() - ativ.getMonth());
  if (meses >= 9 && meses <= 11) return 0;
  if (meses < 9) {
    const entrada = new Date(ativ);
    entrada.setMonth(entrada.getMonth() + 9);
    return Math.ceil((entrada - hoje) / 86400000);
  }
  return null;
}

// ── JSON import ──
function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/), headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const rows=[]; let i=1;
  while(i<lines.length){
    let line=lines[i];
    while((line.match(/"/g)||[]).length%2!==0&&i+1<lines.length){i++;line+=' '+lines[i];}
    const vals=[]; let cur='',inQ=false;
    for(let c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const obj={_id:'lead_'+(i-1)};
    headers.forEach((h,idx)=>{obj[h]=(vals[idx]||'').replace(/\s+/g,' ').trim();});
    if(obj.nome)rows.push(obj);
    i++;
  }
  return rows;
}

    else{parsed=parseCSV(ev.target.result);}
    parsed.forEach(l=>{if(!l.origem)l.origem='google';});
    const obj={}; parsed.forEach(l=>{obj[l._id]=l;});
    await set(ref(db,'leads'),obj);
    showToast(parsed.length+' leads importados!','ok');
  };
  reader.readAsText(file,'utf-8'); e.target.value='';
});

// ── Mailing Excel import ──
function extrairVelocidade(desc){const m=(desc||'').match(/(\d+)\s*mb/i);return m?parseInt(m[1]):null;}

document.getElementById('mailing-input').addEventListener('change', async e => {
  const file=e.target.files[0]; if(!file)return;
  const btn=document.getElementById('mailing-btn');
  btn.disabled=true; btn.textContent='⏳ Lendo...';
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const XLSX=window.XLSX;
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});

      // monta todos os registros
      const entries=[]; let refid=0,winback=0;
      rows.forEach(r=>{
        const status=(r['CONTRATO_STATUS']||'').trim().toUpperCase();
        const origem=status==='ATIVO'?'refidelizacao':'winback';
        const circuito=String(r['CIRCUITO']||'').trim();
        if(!circuito)return;
        const id='circ_'+circuito;
        const descricao=r['PRODUTO_DESCRICAO']||r['PRODUTO_DESCRIÇÃO']||'';
        const ativKey=Object.keys(r).find(k=>k.includes('ATIVA'));
        const ativRaw=ativKey?r[ativKey]:'';
        let ativacao='';
        if(ativRaw){try{ativacao=new Date(ativRaw).toISOString().slice(0,10);}catch(err){}}
        const localidade=(r['LOCALIDADE']||'').trim();
        entries.push([id,{
          _id:id, origem,
          nome:(r['CPF_CNPJ']||id).toString().trim()||id,
          telefone:'', localidade, busca_regiao:localidade,
          cluster:(r['CLUSTER']||'').trim(),
          segmento:(r['SEGMENTO']||'').trim(),
          produto_descricao:descricao,
          velocidade:extrairVelocidade(descricao),
          contrato_ativacao:ativacao,
          modem_propriedade:(r['MODEM_PROPRIEDADE']||'').trim(),
          circuito,
          cpf_cnpj:(r['CPF_CNPJ']||'').toString().trim(),
        }]);
        if(origem==='refidelizacao')refid++;else winback++;
      });

      // grava em lotes de 300 para não travar o Firebase
      const CHUNK=300;
      const total=entries.length;
      for(let i=0;i<total;i+=CHUNK){
        const chunk=entries.slice(i,i+CHUNK);
        const obj=Object.fromEntries(chunk);
        await update(ref(db,'leads'),obj);
        const pct=Math.round(((i+chunk.length)/total)*100);
        btn.textContent=`⏳ ${pct}%`;
      }

      btn.disabled=false; btn.innerHTML='📋 Mailing';
      showToast(`Mailing: ${refid} refidelização, ${winback} winback — ${total} registros`,'ok');
    }catch(err){
      btn.disabled=false; btn.innerHTML='📋 Mailing';
      showToast('Erro ao importar: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file); e.target.value='';
});

// ── Helpers ──
function formatDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'agora';if(d<3600000)return Math.floor(d/60000)+'m atrás';if(d<86400000)return Math.floor(d/3600000)+'h atrás';return Math.floor(d/86400000)+'d atrás';}
function starsHTML(r){const n=parseFloat(r);if(isNaN(n))return'';return '★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n));}
function limparTel(t){return(t||'').replace(/\D/g,'');}
function isCelular(t){const d=limparTel(t);if(d.length===11)return d[2]==='9';if(d.length===9)return d[0]==='9';return false;}
function waURL(t){let d=limparTel(t);if(d.length<=11)d='55'+d;return 'https://wa.me/'+d;}
function rotinaConcluida(data){return data.status!=='novo'&&!!data.nextContact&&!!(data.notes&&data.notes.trim());}
function nomeVendedor(){return currentUser?.displayName||currentUser?.email||'Vendedor';}
function origemLead(l){return l.origem||'google';}
function statusesParaOrigem(origem){return STATUSES_BY_ORIGEM[origem]||STATUSES_BY_ORIGEM.google;}

function getCidades(){
  return [...new Set(leads.map(l=>l.localidade||(l.busca_regiao||'').split(',')[0].trim()).filter(Boolean))].sort();
}
function renderCityFilter(){
  const sel=document.getElementById('city-select');
  if(!sel)return;
  const cidades=getCidades();
  sel.innerHTML=`<option value="todas">📍 Todas as localidades</option>`+
    cidades.map(c=>`<option value="${c}" ${filterCity===c?'selected':''}>${c}</option>`).join('');
  sel.value=filterCity;
  sel.onchange=()=>{
    filterCity=sel.value;
    const lbl=document.getElementById('city-label');
    if(filterCity!=='todas'){lbl.textContent=filterCity;lbl.style.display='';}
    else lbl.style.display='none';
    renderList();
  };
}
function filteredLeads(){
  return leads.filter(l=>{
    const d=getCRM(l._id), origem=origemLead(l);
    if(filterOrigem!=='todos'&&origem!==filterOrigem)return false;
    if(filterStatus!=='todos'&&d.status!==filterStatus)return false;
    const cidade=l.localidade||(l.busca_regiao||'').split(',')[0].trim();
    if(filterCity!=='todas'&&cidade!==filterCity)return false;
    if(filterTempo!=='todos'){const meses=mesesDesdeAtivacao(l);if(faixaTempo(meses)!==filterTempo)return false;}
    if(searchQuery){const q=searchQuery.toLowerCase();return(l.nome||'').toLowerCase().includes(q)||(l.localidade||'').toLowerCase().includes(q)||(l.busca_regiao||'').toLowerCase().includes(q)||(l.telefone||'').includes(q)||(l.cpf_cnpj||'').includes(q);}
    return true;
  });
}
function renderList(){
  const list=document.getElementById('lead-list'), fl=filteredLeads();
  if(!fl.length){list.innerHTML='<div class="no-leads">Nenhum lead encontrado</div>';return;}
  const today=new Date().toISOString().slice(0,10);
  list.innerHTML=fl.map(l=>{
    const data=getCRM(l._id), origem=origemLead(l), sel=l._id===selectedId?' selected':'';
    let dateLabel='';
    if(data.nextContact){const cls=data.nextContact<today?'overdue':data.nextContact===today?'today':'';const pre=data.nextContact<today?'⚠ ':'○ ';dateLabel=`<span class="lc-date ${cls}">${pre}${formatDate(data.nextContact)}</span>`;}
    else{dateLabel=`<span class="lc-date overdue">Sem data</span>`;}
    const ownerLine=data.owner?`<div class="lc-owner">✓ ${data.owner}</div>`:'';
    let urgencyBadge='';
    if(origem==='refidelizacao'){
      const meses=mesesDesdeAtivacao(l), ft=faixaTempo(meses);
      if(ft==='janela'){urgencyBadge=`<span class="urgency-badge">🔥 Janela refid — ${meses}m</span>`;}
      else if(meses!==null&&meses<9){const dias=diasParaJanela(l);if(dias!==null&&dias<=30)urgencyBadge=`<span class="urgency-badge" style="color:#A855F7;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)">⏱ Janela em ${dias}d</span>`;}
    }
    const origemTag=origem!=='google'?`<span class="origem-tag ${origem}">${origem==='refidelizacao'?'Refid':'Winback'}</span>`:'';
    const cobBadge=l.cobertura?`<span class="cob-badge cob-${l.cobertura}" style="margin-top:4px">${l.cobertura==='DISPONIVEL'?'✓ Cobertura':l.cobertura==='SEM_COBERTURA'?'Sem cobertura':'CTO cheia'}</span>`:'';
    const subLine=origem!=='google'
      ?`${l.localidade||''}${l.segmento?' · '+l.segmento:''}${l.velocidade?' · '+l.velocidade+'mb':''}`
      :`${l.busca_regiao||''}${l.categoria?' · '+l.categoria:''}`;
    return `<div class="lead-card status-${data.status}${sel}" data-id="${l._id}">
      <div class="lc-name">${origemTag}${l.nome}</div>
      <div class="lc-sub">${subLine}</div>
      ${ownerLine}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
        <span class="lc-badge badge-${data.status}">${STATUS_LABELS[data.status]||data.status}</span>
        ${dateLabel}
      </div>
      ${urgencyBadge}${cobBadge}
    </div>`;
  }).join('');
  list.querySelectorAll('.lead-card').forEach(el=>el.addEventListener('click',()=>selectLead(el.dataset.id)));
}
function updateStats(){
  document.getElementById('cnt-total').textContent=leads.length;
  document.getElementById('cnt-contato').textContent=leads.filter(l=>['contato','contato_feito'].includes(getCRM(l._id).status)).length;
  document.getElementById('cnt-qualificado').textContent=leads.filter(l=>['qualificado','oferta_apresentada'].includes(getCRM(l._id).status)).length;
  document.getElementById('cnt-fechado').textContent=leads.filter(l=>['fechado','upgrade_aceito','retornou'].includes(getCRM(l._id).status)).length;
}

function selectLead(id){
  if(selectedId&&selectedId!==id&&leadModificado){
    const d=getCRM(selectedId);
    if(!d.nextContact){showToast('Informe a data do próximo contato antes de avançar');document.getElementById('nc-block')?.classList.add('required');return;}
  }
  selectedId=id; leadModificado=false; renderList(); renderDetail();
}
window.selectLead=selectLead;

function buildWABlock(lead,data){
  const tel=data.telefone_editado||lead.telefone||'', d=limparTel(tel);
  if(!d)return `<div><div class="wa-label">WhatsApp</div><div class="wa-status no-phone">Sem telefone</div></div><button class="wa-btn disabled" disabled>${WA_SVG} Sem telefone</button>`;
  if(!isCelular(tel))return `<div><div class="wa-label">WhatsApp</div><div class="wa-status landline">Telefone fixo</div></div><button class="wa-btn disabled" disabled>${WA_SVG} Fixo</button>`;
  if(data.whatsapp)return `<div><div class="wa-label">WhatsApp</div><div class="wa-status confirmed">✓ Confirmado — ${tel}</div></div><div class="wa-actions"><label class="wa-toggle"><input type="checkbox" checked onchange="toggleWhatsapp(this.checked)"> Tem WhatsApp</label><a class="wa-btn" href="${waURL(tel)}" target="_blank">${WA_SVG} Abrir conversa</a></div>`;
  return `<div><div class="wa-label">WhatsApp</div><div class="wa-status pending">Celular detectado — confirme</div></div><div class="wa-actions"><label class="wa-toggle"><input type="checkbox" onchange="toggleWhatsapp(this.checked)"> Tem WhatsApp</label><button class="wa-btn disabled" disabled>${WA_SVG} Abrir conversa</button></div>`;
}
function buildAposseBlock(data){
  if(data.owner===nomeVendedor())return `<div><div class="ap-label">Responsável</div><div class="ap-status mine">✓ Você é o responsável</div></div><button class="aposse-btn" style="background:#EF4444" onclick="liberarLead()">Liberar lead</button>`;
  if(data.owner)return `<div><div class="ap-label">Responsável</div><div class="ap-status other">Em posse de ${data.owner}</div></div><button class="aposse-btn" disabled>Lead ocupado</button>`;
  const pode=rotinaConcluida(data);
  return `<div><div class="ap-label">Responsável</div><div class="ap-status free">Disponível</div>${!pode?'<div class="ap-hint">Complete: status + data + anotação</div>':''}</div><button class="aposse-btn" ${pode?'':'disabled'} onclick="apossarLead()">Assumir lead</button>`;
}

function renderDetail(){
  const panel=document.getElementById('detail-panel'); if(!selectedId)return;
  const lead=leads.find(l=>l._id===selectedId); if(!lead)return;
  const data=getCRM(lead._id), origem=origemLead(lead);
  const statuses=statusesParaOrigem(origem);
  const statusOpts=statuses.map(s=>`<option value="${s}" ${data.status===s?'selected':''}>${STATUS_LABELS[s]||s}</option>`).join('');

  let bannerHTML='';
  if(origem==='refidelizacao'){
    const meses=mesesDesdeAtivacao(lead), ft=faixaTempo(meses);
    if(ft==='janela'){
      bannerHTML=`<div class="mailing-banner" style="border-color:#F5A623"><div class="mailing-banner-icon">🔥</div><div><div class="mailing-banner-title">Janela de refidelização ativa</div><div class="mailing-banner-sub">Cliente há ${meses} meses — aborde antes do mês 12</div></div></div>`;
    } else if(meses!==null&&meses<9){
      const dias=diasParaJanela(lead);
      if(dias!==null&&dias<=30)bannerHTML=`<div class="mailing-banner" style="border-color:#A855F7"><div class="mailing-banner-icon">⏱</div><div><div class="mailing-banner-title">Entrará na janela em ${dias} dias</div><div class="mailing-banner-sub">Prepare a abordagem — cliente completa 9 meses em breve</div></div></div>`;
    }
  }

  let mailingInfoHTML='';
  if(origem!=='google'){
    const meses=mesesDesdeAtivacao(lead);
    const tempoLabel=meses!==null?(meses>=12?Math.floor(meses/12)+'a '+(meses%12)+'m':meses+'m'):'—';
    const vel=lead.velocidade;
    const velClass=!vel?'':(vel<=100?'baixa':vel>=600?'alta':'');
    const tel=data.telefone_editado||lead.telefone||'';
    mailingInfoHTML=`
      <div class="section-title" style="margin-bottom:8px">Dados do contrato</div>
      <div class="info-grid" style="margin-bottom:24px">
        <div class="info-cell"><div class="label">Plano atual</div><div class="value">
          ${vel?`<span class="vel-badge ${velClass}">${vel} mb</span>`:'—'}
          <span style="font-size:11px;color:var(--muted);margin-left:8px">${lead.produto_descricao||''}</span>
        </div></div>
        <div class="info-cell"><div class="label">Tempo de cliente</div><div class="value" style="font-size:15px;font-weight:700">${tempoLabel}</div></div>
        <div class="info-cell"><div class="label">Ativação</div><div class="value">${formatDate(lead.contrato_ativacao)||'—'}</div></div>
        <div class="info-cell"><div class="label">Segmento</div><div class="value">${lead.segmento||'—'}</div></div>
        <div class="info-cell"><div class="label">Cluster</div><div class="value">${lead.cluster||'—'}</div></div>
        <div class="info-cell"><div class="label">Modem</div><div class="value" style="font-size:12px">${lead.modem_propriedade||'—'}</div></div>
        <div class="info-cell"><div class="label">CPF/CNPJ</div><div class="value" style="font-size:12px">${lead.cpf_cnpj||'—'}</div></div>
        <div class="info-cell"><div class="label">Circuito</div><div class="value" style="font-size:12px">${lead.circuito||'—'}</div></div>
        <div class="info-cell" style="grid-column:1/-1">
          <div class="label">Telefone <span style="color:var(--accent);font-weight:600">(preencha para ativar WhatsApp)</span></div>
          <input type="tel" id="tel-edit" value="${tel}" placeholder="(XX) 9XXXX-XXXX" style="margin-top:6px" oninput="saveTelefone(this.value)">
        </div>
      </div>`;
  }

  let googleInfoHTML='';
  if(origem==='google'){
    const site=lead.site?`<a href="${lead.site.startsWith('http')?lead.site:'https://'+lead.site}" target="_blank">${lead.site}</a>`:'<span style="color:var(--muted)">—</span>';
    const cobBadge=lead.cobertura?`<span class="cob-badge cob-${lead.cobertura}">${lead.cobertura==='DISPONIVEL'?'✓ Com cobertura':lead.cobertura}</span>${lead.cto?`<span style="font-size:11px;color:var(--muted);margin-left:8px">CTO: ${lead.cto} · ${lead.distancia_cto}m</span>`:''}`:'—';
    googleInfoHTML=`<div class="info-grid">
      <div class="info-cell"><div class="label">Telefone</div><div class="value">${lead.telefone||'—'}</div></div>
      <div class="info-cell"><div class="label">Site</div><div class="value">${site}</div></div>
      <div class="info-cell" style="grid-column:1/-1"><div class="label">Endereço</div><div class="value">${lead.endereco||'—'}</div></div>
      <div class="info-cell"><div class="label">Avaliação</div><div class="value"><span class="stars">${starsHTML(lead.rating)}</span> ${lead.rating||''} ${lead.avaliacoes?'('+lead.avaliacoes+')':''}</div></div>
      <div class="info-cell"><div class="label">Cobertura</div><div class="value">${cobBadge}</div></div>
      <div class="info-cell" style="grid-column:1/-1"><div class="label">Google Maps</div><div class="value"><a href="${lead.url_maps||'#'}" target="_blank">Abrir no Google Maps ↗</a></div></div>
    </div>`;
  }

  const activity=(data.activity||[]).slice().reverse().map(a=>
    `<div class="activity-item"><div class="activity-dot" style="background:var(--s-${a.status||'novo'})"></div><div><div class="activity-text"><strong>${STATUS_LABELS[a.status]||a.action}</strong>${a.note?' — '+a.note:''}</div>${a.vendedor?`<div style="font-size:10px;color:var(--muted);margin-top:1px">${a.vendedor}</div>`:''}<div class="activity-time">${timeAgo(a.ts)}</div></div></div>`
  ).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px 0">Nenhuma atividade ainda</div>';

  const origemBadge=origem!=='google'?`<span class="origem-tag ${origem}" style="font-size:11px;padding:2px 8px">${origem==='refidelizacao'?'Refidelização':'Winback'}</span>`:'';

  panel.innerHTML=`
    ${bannerHTML}
    <div class="detail-header">
      <div><div style="margin-bottom:4px">${origemBadge}</div><div class="detail-name">${lead.nome}</div><div class="detail-cat">${lead.localidade||lead.categoria||lead.busca_regiao||''}</div></div>
      <select class="status-select" onchange="changeStatus(this.value)">${statusOpts}</select>
    </div>
    ${mailingInfoHTML}${googleInfoHTML}
    <div id="wa-block" class="wa-block">${buildWABlock(lead,data)}</div>
    <div id="nc-block" class="next-contact-block${data.nextContact?'':' required'}">
      <div><div class="nc-label">Próximo contato</div><div class="nc-hint">Obrigatório antes de avançar para outro lead</div></div>
      <input type="date" id="nc-date" value="${data.nextContact||''}" onchange="saveNextContact(this.value)">
    </div>
    <div class="section-title">Anotações</div>
    <textarea id="notes-ta" placeholder="Registre observações, próximo passo, histórico...">${data.notes||''}</textarea>
    <button class="save-btn" onclick="saveNotes()">Salvar anotação</button>
    <div id="aposse-block" class="aposse-block${data.owner===nomeVendedor()?' owned-me':data.owner?' owned-other':''}" style="margin-top:24px">${buildAposseBlock(data)}</div>
    <div style="margin-top:28px"><div class="section-title">Histórico de atividades</div><div id="activity-list">${activity}</div></div>`;
}

// ── Actions ──
window.changeStatus=async v=>{if(!selectedId)return;leadModificado=true;const d=getCRM(selectedId);const old=d.status;const act=[...(d.activity||[]),{status:v,action:`${STATUS_LABELS[old]||old} → ${STATUS_LABELS[v]||v}`,vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{status:v,activity:act});};
window.saveNextContact=async v=>{if(!selectedId)return;leadModificado=true;const d=getCRM(selectedId);const act=[...(d.activity||[]),{action:'Data de contato definida',note:formatDate(v),vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{nextContact:v,activity:act});document.getElementById('nc-block')?.classList.toggle('required',!v);};
window.saveNotes=async()=>{if(!selectedId)return;leadModificado=true;const ta=document.getElementById('notes-ta');const d=getCRM(selectedId);const prev=ta.value.slice(0,60)+(ta.value.length>60?'…':'');const act=[...(d.activity||[]),{action:'Anotação salva',note:prev,vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{notes:ta.value,activity:act});showToast('Anotação salva','ok');};
window.saveTelefone=async v=>{if(!selectedId)return;leadModificado=true;await saveCRM(selectedId,{telefone_editado:v});const lead=leads.find(l=>l._id===selectedId);const data=getCRM(selectedId);data.telefone_editado=v;const wb=document.getElementById('wa-block');if(wb)wb.innerHTML=buildWABlock(lead,data);};
window.toggleWhatsapp=async c=>{if(!selectedId)return;const d=getCRM(selectedId);const act=[...(d.activity||[]),{action:c?'WhatsApp confirmado':'WhatsApp desmarcado',vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{whatsapp:c,activity:act});};
window.apossarLead=async()=>{if(!selectedId)return;const d=getCRM(selectedId);if(d.owner)return showToast('Lead já assumido por '+d.owner);const act=[...(d.activity||[]),{action:'Lead assumido',note:nomeVendedor(),vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{owner:nomeVendedor(),ownerEmail:currentUser?.email||'',ownerPhoto:currentUser?.photoURL||'',activity:act});showToast('Você assumiu este lead!','ok');};
window.liberarLead=async()=>{if(!selectedId)return;const d=getCRM(selectedId);const act=[...(d.activity||[]),{action:'Lead liberado',vendedor:nomeVendedor(),ts:Date.now()}];await saveCRM(selectedId,{owner:'',ownerEmail:'',ownerPhoto:'',activity:act});showToast('Lead liberado');};

document.getElementById('search').addEventListener('input',e=>{searchQuery=e.target.value;renderList();});
document.getElementById('filter-row').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');if(!btn)return;
  filterStatus=btn.dataset.status;
  document.querySelectorAll('#filter-row .filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
  renderList();
});

// ── Relatórios ──
window.openReports=()=>{renderReports();document.getElementById('reports-overlay').classList.add('open');};
window.closeReports=()=>{document.getElementById('reports-overlay').classList.remove('open');};
document.getElementById('reports-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('reports-overlay'))closeReports();});

function renderReports(){
  const today=new Date().toISOString().slice(0,10);
  const byStatus={},byVendor={},byCity={},byOrigem={google:0,refidelizacao:0,winback:0};
  let atrasados=[],janelaAtivos=[],janelaProximos30=[];

  leads.forEach(l=>{
    const d=getCRM(l._id), origem=origemLead(l);
    byStatus[d.status]=(byStatus[d.status]||0)+1;
    byOrigem[origem]=(byOrigem[origem]||0)+1;
    if(d.owner){byVendor[d.owner]=byVendor[d.owner]||{total:0,convertido:0,contato:0};byVendor[d.owner].total++;if(['fechado','upgrade_aceito','retornou'].includes(d.status))byVendor[d.owner].convertido++;if(['contato','contato_feito'].includes(d.status))byVendor[d.owner].contato++;}
    const cidade=l.localidade||(l.busca_regiao||'').split(',')[0].trim();
    if(cidade)byCity[cidade]=(byCity[cidade]||0)+1;
    if(d.nextContact&&d.nextContact<today&&!['fechado','descartado','upgrade_aceito','retornou','recusou'].includes(d.status)){atrasados.push({nome:l.nome,id:l._id,data:d.nextContact,owner:d.owner||'—',cidade});}
    if(origem==='refidelizacao'){
      const meses=mesesDesdeAtivacao(l),ft=faixaTempo(meses);
      if(ft==='janela')janelaAtivos.push({nome:l.nome,id:l._id,meses,cidade,velocidade:l.velocidade,status:d.status});
      else if(meses!==null&&meses<9){const dias=diasParaJanela(l);if(dias!==null&&dias<=30)janelaProximos30.push({nome:l.nome,id:l._id,dias,cidade,velocidade:l.velocidade});}
    }
  });

  const convertidos=leads.filter(l=>['fechado','upgrade_aceito','retornou'].includes(getCRM(l._id).status)).length;
  const ativos=leads.length-(byStatus['descartado']||0)-(byStatus['recusou']||0)-convertidos;

  document.getElementById('rp-summary').innerHTML=[
    {val:leads.length,label:'Total de leads',color:'var(--accent)'},
    {val:ativos,label:'Em tratativa',color:'var(--s-contato)'},
    {val:convertidos,label:'Convertidos',color:'var(--s-fechado)'},
    {val:atrasados.length,label:'Atrasados',color:'#EF4444'},
  ].map(s=>`<div class="rp-summary-card"><div style="font-size:32px;font-weight:900;color:${s.color};font-variant-numeric:tabular-nums;line-height:1">${s.val}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${s.label}</div></div>`).join('');

  const origemColors={google:'var(--accent)',refidelizacao:'#10B981',winback:'#F5A623'};
  const origemLabels={google:'Google Maps',refidelizacao:'Refidelização',winback:'Winback'};
  const maxOrig=Math.max(...Object.values(byOrigem),1);
  const origemHTML=`<div class="rp-card"><div class="rp-card-title">Por origem</div>${Object.entries(byOrigem).map(([o,n])=>`<div class="rp-bar-row"><div class="rp-bar-label">${origemLabels[o]}</div><div class="rp-bar-track"><div class="rp-bar-fill" style="width:${Math.round((n/maxOrig)*100)}%;background:${origemColors[o]}"></div></div><div class="rp-bar-count">${n}</div></div>`).join('')}</div>`;

  const janelaHTML=`<div class="rp-card"><div class="rp-card-title" style="color:#F5A623">🔥 Janela refidelização (9–11 meses)</div>
    <div style="display:flex;gap:16px;margin-bottom:12px">
      <div><div style="font-size:28px;font-weight:900;color:#F5A623">${janelaAtivos.length}</div><div style="font-size:11px;color:var(--muted)">Na janela agora</div></div>
      <div><div style="font-size:28px;font-weight:900;color:#A855F7">${janelaProximos30.length}</div><div style="font-size:11px;color:var(--muted)">Entram em 30 dias</div></div>
    </div>
    ${janelaAtivos.slice(0,5).map(a=>`<div class="janela-row" onclick="closeReports();selectLead('${a.id}')"><div class="janela-nome">${a.nome}</div><div class="janela-meta">${a.cidade} · ${a.meses}m · ${a.velocidade?a.velocidade+'mb':'—'} · ${STATUS_LABELS[a.status]||a.status}</div></div>`).join('')}
    ${janelaAtivos.length>5?`<div style="font-size:11px;color:var(--muted);padding-top:6px">+${janelaAtivos.length-5} mais na janela</div>`:''}
    ${janelaProximos30.slice(0,3).map(a=>`<div class="janela-row" style="opacity:.7" onclick="closeReports();selectLead('${a.id}')"><div class="janela-nome" style="color:#A855F7">⏱ ${a.nome}</div><div class="janela-meta">${a.cidade} · em ${a.dias}d · ${a.velocidade?a.velocidade+'mb':'—'}</div></div>`).join('')}
  </div>`;

  const vendedoresSort=Object.entries(byVendor).sort((a,b)=>b[1].total-a[1].total);
  const vendHTML=`<div class="rp-card"><div class="rp-card-title">Por vendedor</div>${vendedoresSort.length?vendedoresSort.map(([v,d])=>`<div class="rp-vendor-row"><div><div class="rp-vendor-name">${v}</div><div class="rp-vendor-sub">${d.contato} em contato · ${d.convertido} convertidos</div></div><div style="font-size:18px;font-weight:700;color:var(--text)">${d.total}</div></div>`).join(''):'<div style="color:var(--muted);font-size:12px">Nenhum lead assumido ainda</div>'}</div>`;

  const cidadesSort=Object.entries(byCity).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCid=Math.max(...cidadesSort.map(c=>c[1]),1);
  const cidHTML=`<div class="rp-card"><div class="rp-card-title">Por cidade</div>${cidadesSort.map(([c,n])=>`<div class="rp-bar-row"><div class="rp-bar-label">${c}</div><div class="rp-bar-track"><div class="rp-bar-fill" style="width:${Math.round((n/maxCid)*100)}%;background:var(--accent)"></div></div><div class="rp-bar-count">${n}</div></div>`).join('')||'<div style="color:var(--muted);font-size:12px">Sem dados</div>'}</div>`;

  const atrasHTML=`<div class="rp-card" style="grid-column:1/-1"><div class="rp-card-title" style="color:#EF4444">⚠ Leads com contato atrasado (${atrasados.length})</div>${atrasados.length?atrasados.slice(0,20).map(a=>`<div class="rp-overdue-row" onclick="closeReports();selectLead('${a.id}')"><div class="rp-overdue-name">${a.nome}</div><div class="rp-overdue-meta">${a.cidade} · Resp: ${a.owner} · Deveria: ${formatDate(a.data)}</div></div>`).join(''):'<div style="color:var(--s-fechado);font-size:12px">✓ Nenhum lead atrasado</div>'}</div>`;

  document.getElementById('rp-grid').innerHTML=origemHTML+janelaHTML+vendHTML+cidHTML+atrasHTML;
}
</script>
