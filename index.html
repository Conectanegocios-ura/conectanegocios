<title>CRM Leads — Conecta Tech</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0D1117;
    --surface:   #131C2B;
    --surface2:  #1A2540;
    --border:    #1E2D45;
    --border2:   #263550;
    --text:      #C8D4E8;
    --muted:     #5A6E8C;
    --accent:    #3D7EF5;
    --accent-dim:#1E3A7A;
    --s-novo:        #5A6E8C;
    --s-contato:     #F5A623;
    --s-qualificado: #3D7EF5;
    --s-negociando:  #A855F7;
    --s-fechado:     #10B981;
    --s-descartado:  #EF4444;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; }

  /* ── Login modal ── */
  #login-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #login-modal.hidden { display: none; }
  .login-box {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
    padding: 32px 36px; width: 340px; display: flex; flex-direction: column; gap: 16px;
  }
  .login-box h2 { font-size: 18px; font-weight: 700; }
  .login-box p  { font-size: 13px; color: var(--muted); }
  .login-box input {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    border-radius: 6px; padding: 10px 12px; font-size: 14px; outline: none; width: 100%;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .login-box button:hover { opacity: .85; }

  /* ── Layout ── */
  #app { display: grid; grid-template-rows: 48px 1fr; height: 100vh; overflow: hidden; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 0 20px;
  }
  header h1 { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .vendedor-chip {
    background: var(--accent-dim); border: 1px solid var(--accent);
    color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 10px;
    border-radius: 4px; letter-spacing: .04em;
  }
  header .stats { display: flex; gap: 20px; margin-left: auto; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .stat strong { color: var(--text); font-size: 15px; font-weight: 600; }
  .stat .dot { width: 7px; height: 7px; border-radius: 50%; }

  #main { display: grid; grid-template-columns: 340px 1fr; overflow: hidden; }

  /* ── List panel ── */
  #list-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  #list-toolbar { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  #search { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; padding: 7px 10px; font-size: 13px; width: 100%; outline: none; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  #load-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-weight: 500; }
  #lead-list { overflow-y: auto; flex: 1; }
  #lead-list::-webkit-scrollbar { width: 4px; }
  #lead-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .lead-card { padding: 12px 14px 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; border-left: 3px solid transparent; }
  .lead-card:hover { background: var(--surface2); }
  .lead-card.selected { background: var(--surface2); }
  .lead-card .lc-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lead-card .lc-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lead-card .lc-badge { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; display: inline-block; }
  .lc-date { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .lc-date.overdue { color: #EF4444; }
  .lc-date.today   { color: var(--s-contato); }
  .lc-owner { font-size: 10px; color: #10B981; margin-top: 2px; font-weight: 600; }

  .status-novo        { border-left-color: var(--s-novo); }
  .status-contato     { border-left-color: var(--s-contato); }
  .status-qualificado { border-left-color: var(--s-qualificado); }
  .status-negociando  { border-left-color: var(--s-negociando); }
  .status-fechado     { border-left-color: var(--s-fechado); }
  .status-descartado  { border-left-color: var(--s-descartado); }

  .badge-novo        { background: rgba(90,110,140,.2);  color: var(--s-novo); }
  .badge-contato     { background: rgba(245,166,35,.15); color: var(--s-contato); }
  .badge-qualificado { background: rgba(61,126,245,.15); color: var(--s-qualificado); }
  .badge-negociando  { background: rgba(168,85,247,.15); color: var(--s-negociando); }
  .badge-fechado     { background: rgba(16,185,129,.15); color: var(--s-fechado); }
  .badge-descartado  { background: rgba(239,68,68,.15);  color: var(--s-descartado); }

  /* ── Detail panel ── */
  #detail-panel { overflow-y: auto; padding: 28px 32px; }
  #detail-panel::-webkit-scrollbar { width: 4px; }
  #detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
  #empty-state svg { opacity: .3; }

  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
  .detail-name { font-size: 22px; font-weight: 700; line-height: 1.2; text-wrap: balance; }
  .detail-cat  { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .status-select { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; cursor: pointer; outline: none; flex-shrink: 0; }
  .status-select:focus { border-color: var(--accent); }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .info-cell { background: var(--surface); padding: 12px 16px; }
  .info-cell .label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
  .info-cell .value { font-size: 13px; word-break: break-word; }
  .info-cell .value a { color: var(--accent); text-decoration: none; }
  .info-cell .value a:hover { text-decoration: underline; }
  .rating-stars { display: flex; align-items: center; gap: 6px; }
  .stars { color: #F5A623; font-size: 14px; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }

  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; padding: 10px 12px; font-size: 13px; line-height: 1.6; resize: vertical; min-height: 100px; outline: none; font-family: inherit; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; margin-top: 5px; }
  .activity-text { font-size: 12px; color: var(--muted); }
  .activity-text strong { color: var(--text); }
  .activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .save-btn:hover { opacity: .85; }
  .no-leads { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  #file-input { display: none; }

  /* ── Next contact ── */
  .next-contact-block { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 16px 18px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .next-contact-block.required { border-color: #EF4444; box-shadow: 0 0 0 1px rgba(239,68,68,.3); }
  .next-contact-block .nc-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
  .next-contact-block .nc-hint { font-size: 11px; color: #EF4444; margin-top: 4px; display: none; }
  .next-contact-block.required .nc-hint { display: block; }
  input[type="date"] { background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; color-scheme: dark; cursor: pointer; }
  input[type="date"]:focus { border-color: var(--accent); }

  /* ── WhatsApp ── */
  .wa-block { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .wa-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 3px; }
  .wa-status { font-size: 12px; }
  .wa-status.confirmed { color: #10B981; }
  .wa-status.landline, .wa-status.no-phone { color: var(--muted); }
  .wa-status.pending { color: var(--s-contato); }
  .wa-actions { display: flex; align-items: center; gap: 10px; }
  .wa-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
  .wa-toggle input[type="checkbox"] { accent-color: #25D366; width: 14px; height: 14px; cursor: pointer; }
  .wa-btn { display: inline-flex; align-items: center; gap: 7px; background: #25D366; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .wa-btn:hover { opacity: .85; }
  .wa-btn.disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; pointer-events: none; }
  .wa-icon { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

  /* ── Aposse button ── */
  .aposse-block { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 16px 18px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .aposse-block.owned-me  { border-color: #10B981; }
  .aposse-block.owned-other { border-color: var(--s-negociando); }
  .aposse-info .ap-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
  .aposse-info .ap-status { font-size: 13px; font-weight: 600; }
  .ap-status.free    { color: var(--muted); }
  .ap-status.mine    { color: #10B981; }
  .ap-status.other   { color: var(--s-negociando); }
  .ap-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .aposse-btn { background: #10B981; color: #fff; border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .aposse-btn:hover { opacity: .85; }
  .aposse-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: #EF4444; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.green { background: #10B981; }

  /* ── Sync indicator ── */
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #10B981; display: inline-block; margin-right: 6px; }
  .sync-dot.syncing { background: var(--s-contato); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>

<!-- Login modal -->
<div id="login-modal">
  <div class="login-box">
    <h2>CRM Conecta Tech</h2>
    <p>Informe seu nome para continuar. Ele ficará registrado em todas as suas ações.</p>
    <input id="login-input" placeholder="Seu nome completo" maxlength="40" autocomplete="off">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<div id="toast"></div>

<div id="app">
  <header>
    <h1>CRM Leads</h1>
    <span class="vendedor-chip" id="vendedor-nome"></span>
    <span style="display:flex;align-items:center;font-size:11px;color:var(--muted)">
      <span class="sync-dot" id="sync-dot"></span><span id="sync-label">conectando...</span>
    </span>
    <div class="stats" style="margin-left:auto;">
      <span class="stat"><span class="dot" style="background:var(--s-novo)"></span><strong id="cnt-total">0</strong> total</span>
      <span class="stat"><span class="dot" style="background:var(--s-contato)"></span><strong id="cnt-contato">0</strong> contato</span>
      <span class="stat"><span class="dot" style="background:var(--s-qualificado)"></span><strong id="cnt-qualificado">0</strong> qualif.</span>
      <span class="stat"><span class="dot" style="background:var(--s-fechado)"></span><strong id="cnt-fechado">0</strong> fechados</span>
    </div>
  </header>

  <div id="main">
    <div id="list-panel">
      <div id="list-toolbar">
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="search" placeholder="Buscar por nome, cidade..." type="text">
          <button id="load-btn" onclick="document.getElementById('file-input').click()">Importar CSV</button>
          <input type="file" id="file-input" accept=".csv">
        </div>
        <div class="filter-row" id="filter-row">
          <button class="filter-btn active" data-status="todos">Todos</button>
          <button class="filter-btn" data-status="novo">Novo</button>
          <button class="filter-btn" data-status="contato">Contato</button>
          <button class="filter-btn" data-status="qualificado">Qualificado</button>
          <button class="filter-btn" data-status="negociando">Negociando</button>
          <button class="filter-btn" data-status="fechado">Fechado</button>
          <button class="filter-btn" data-status="descartado">Descartado</button>
        </div>
      </div>
      <div id="lead-list"></div>
    </div>

    <div id="detail-panel">
      <div id="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <p style="font-size:13px;color:var(--muted)">Importe o CSV de leads ou selecione um lead da lista</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAq2JECHZ-VVxXA2qWO_GrI0flwyj0YVBA",
    authDomain: "conecta-tech---crm.firebaseapp.com",
    databaseURL: "https://conecta-tech---crm-default-rtdb.firebaseio.com",
    projectId: "conecta-tech---crm",
    storageBucket: "conecta-tech---crm.firebasestorage.app",
    messagingSenderId: "796944967500",
    appId: "1:796944967500:web:4f776e2de5c3aa30df11e9",
    measurementId: "G-75SEJTLV5G"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── State ──
  let vendedor    = '';
  let leads       = [];
  let crmData     = {};   // id -> { status, notes, nextContact, whatsapp, owner, activity[] }
  let selectedId  = null;
  let filterStatus = 'todos';
  let searchQuery  = '';

  const STATUSES = ['novo','contato','qualificado','negociando','fechado','descartado'];
  const STATUS_LABELS = { novo:'Novo', contato:'Em Contato', qualificado:'Qualificado', negociando:'Negociando', fechado:'Fechado', descartado:'Descartado' };

  // ── Login ──
  window.entrar = function() {
    const nome = document.getElementById('login-input').value.trim();
    if (!nome) return;
    vendedor = nome;
    localStorage.setItem('crm_vendedor', nome);
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('vendedor-nome').textContent = vendedor;
    iniciarSync();
  };

  const nomeGuardado = localStorage.getItem('crm_vendedor');
  if (nomeGuardado) {
    vendedor = nomeGuardado;
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('vendedor-nome').textContent = vendedor;
    iniciarSync();
  }

  document.getElementById('login-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.entrar(); });

  // ── Firebase sync ──
  function iniciarSync() {
    setSyncStatus('syncing');

    // Leads
    onValue(ref(db, 'leads'), snap => {
      leads = snap.val() ? Object.values(snap.val()) : [];
      setSyncStatus('ok');
      renderList();
      if (selectedId) renderDetail();
      updateStats();
    });

    // CRM data
    onValue(ref(db, 'crm'), snap => {
      crmData = snap.val() || {};
      renderList();
      if (selectedId) renderDetail();
      updateStats();
    });
  }

  function setSyncStatus(state) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    if (state === 'ok') { dot.className = 'sync-dot'; lbl.textContent = 'sincronizado'; }
    else { dot.className = 'sync-dot syncing'; lbl.textContent = 'sincronizando...'; }
  }

  function getCRM(id) {
    if (!crmData[id]) crmData[id] = { status: 'novo', notes: '', nextContact: '', whatsapp: false, owner: '', activity: [] };
    return crmData[id];
  }

  async function saveCRM(id, patch) {
    setSyncStatus('syncing');
    await update(ref(db, 'crm/' + id), patch);
  }

  // ── CSV ──
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
    const rows = [];
    let i = 1;
    while (i < lines.length) {
      let line = lines[i];
      while ((line.match(/"/g)||[]).length % 2 !== 0 && i + 1 < lines.length) {
        i++; line += ' ' + lines[i];
      }
      const vals = [];
      let cur = '', inQ = false;
      for (let c of line) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      vals.push(cur.trim());
      const obj = { _id: 'lead_' + (i - 1) };
      headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').replace(/\s+/g,' ').trim(); });
      if (obj.nome) rows.push(obj);
      i++;
    }
    return rows;
  }

  // ── Helpers ──
  function formatDate(iso) {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function timeAgo(ts) {
    const d = Date.now() - ts;
    if (d < 60000) return 'agora';
    if (d < 3600000) return Math.floor(d/60000) + 'm atrás';
    if (d < 86400000) return Math.floor(d/3600000) + 'h atrás';
    return Math.floor(d/86400000) + 'd atrás';
  }

  function starsHTML(rating) {
    const n = parseFloat(rating); if (isNaN(n)) return '';
    return '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));
  }

  function limparTel(tel) { return (tel||'').replace(/\D/g,''); }
  function isCelular(tel) {
    const d = limparTel(tel);
    if (d.length === 11) return d[2] === '9';
    if (d.length === 9)  return d[0] === '9';
    return false;
  }
  function waURL(tel) {
    let d = limparTel(tel);
    if (d.length <= 11) d = '55' + d;
    return 'https://wa.me/' + d;
  }

  window.showToast = function(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = tipo === 'ok' ? 'show green' : 'show';
    setTimeout(() => t.className = '', 3000);
  };

  // ── Rotina completa = status ≠ novo + nextContact preenchido + nota salva ──
  function rotinaConcluida(data) {
    return data.status !== 'novo' && !!data.nextContact && !!(data.notes && data.notes.trim());
  }

  // ── List ──
  function filteredLeads() {
    return leads.filter(l => {
      const d = getCRM(l._id);
      if (filterStatus !== 'todos' && d.status !== filterStatus) return false;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        return (l.nome||'').toLowerCase().includes(q)
          || (l.busca_regiao||'').toLowerCase().includes(q)
          || (l.categoria||'').toLowerCase().includes(q)
          || (l.telefone||'').includes(q);
      }
      return true;
    });
  }

  window.renderList = function() {
    const list = document.getElementById('lead-list');
    const fl = filteredLeads();
    if (!fl.length) { list.innerHTML = '<div class="no-leads">Nenhum lead encontrado</div>'; return; }
    const today = new Date().toISOString().slice(0,10);
    list.innerHTML = fl.map(l => {
      const data = getCRM(l._id);
      const sel = l._id === selectedId ? ' selected' : '';
      let dateLabel = '';
      if (data.nextContact) {
        const cls = data.nextContact < today ? 'overdue' : data.nextContact === today ? 'today' : '';
        const pre = data.nextContact < today ? '⚠ ' : '○ ';
        dateLabel = `<span class="lc-date ${cls}">${pre}${formatDate(data.nextContact)}</span>`;
      } else {
        dateLabel = `<span class="lc-date overdue">Sem data</span>`;
      }
      const ownerLine = data.owner ? `<div class="lc-owner">✓ ${data.owner}</div>` : '';
      return `<div class="lead-card status-${data.status}${sel}" data-id="${l._id}">
        <div class="lc-name">${l.nome}</div>
        <div class="lc-sub">${l.busca_regiao||''} ${l.categoria ? '· '+l.categoria : ''}</div>
        ${ownerLine}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
          <span class="lc-badge badge-${data.status}">${STATUS_LABELS[data.status]}</span>
          ${dateLabel}
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.lead-card').forEach(el => el.addEventListener('click', () => selectLead(el.dataset.id)));
    updateStats();
  };

  function updateStats() {
    document.getElementById('cnt-total').textContent = leads.length;
    ['contato','qualificado','fechado'].forEach(s => {
      document.getElementById('cnt-'+s).textContent = leads.filter(l => getCRM(l._id).status === s).length;
    });
  }

  // ── Select ──
  function selectLead(id) {
    if (selectedId && selectedId !== id) {
      const d = getCRM(selectedId);
      if (!d.nextContact) {
        showToast('Informe a data do próximo contato antes de avançar');
        document.getElementById('nc-block')?.classList.add('required');
        return;
      }
    }
    selectedId = id; renderList(); renderDetail();
  }

  // ── Detail ──
  window.renderDetail = function() {
    const panel = document.getElementById('detail-panel');
    if (!selectedId) return;
    const lead = leads.find(l => l._id === selectedId);
    if (!lead) return;
    const data = getCRM(lead._id);

    const statusOpts = STATUSES.map(s => `<option value="${s}" ${data.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('');
    const site = lead.site ? `<a href="${lead.site.startsWith('http')?lead.site:'https://'+lead.site}" target="_blank">${lead.site}</a>` : '<span style="color:var(--muted)">—</span>';
    const tel  = lead.telefone || '<span style="color:var(--muted)">—</span>';
    const end  = lead.endereco || '<span style="color:var(--muted)">—</span>';
    const rating = lead.rating ? `<span class="stars">${starsHTML(lead.rating)}</span> ${lead.rating} ${lead.avaliacoes?'('+lead.avaliacoes+' aval.)':''}` : '—';

    const activity = (data.activity||[]).slice().reverse().map(a =>
      `<div class="activity-item">
        <div class="activity-dot" style="background:var(--s-${a.status||'novo'})"></div>
        <div><div class="activity-text"><strong>${STATUS_LABELS[a.status]||a.action}</strong>${a.note?' — '+a.note:''}</div>
        <div class="activity-time">${timeAgo(a.ts)}</div></div>
      </div>`).join('') || '<div style="color:var(--muted);font-size:12px;padding:8px 0">Nenhuma atividade ainda</div>';

    panel.innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-name">${lead.nome}</div>
          <div class="detail-cat">${lead.categoria||lead.busca_regiao||''}</div>
        </div>
        <select class="status-select" onchange="changeStatus(this.value)">${statusOpts}</select>
      </div>

      <div class="info-grid">
        <div class="info-cell"><div class="label">Telefone</div><div class="value">${tel}</div></div>
        <div class="info-cell"><div class="label">Site</div><div class="value">${site}</div></div>
        <div class="info-cell" style="grid-column:1/-1"><div class="label">Endereço</div><div class="value">${end}</div></div>
        <div class="info-cell"><div class="label">Avaliação</div><div class="value">${rating}</div></div>
        <div class="info-cell"><div class="label">Região</div><div class="value">${lead.busca_regiao||'—'}</div></div>
        <div class="info-cell" style="grid-column:1/-1"><div class="label">Google Maps</div><div class="value"><a href="${lead.url_maps||'#'}" target="_blank">Abrir no Google Maps ↗</a></div></div>
      </div>

      <div id="wa-block" class="wa-block">${buildWABlock(lead,data)}</div>

      <div id="nc-block" class="next-contact-block${data.nextContact?'':' required'}">
        <div>
          <div class="nc-label">Próximo contato</div>
          <div class="nc-hint">Obrigatório antes de avançar para outro lead</div>
        </div>
        <input type="date" id="nc-date" value="${data.nextContact||''}" onchange="saveNextContact(this.value)">
      </div>

      <div class="section-title">Anotações</div>
      <textarea id="notes-ta" placeholder="Registre observações, próximo passo, histórico de conversa...">${data.notes||''}</textarea>
      <button class="save-btn" onclick="saveNotes()">Salvar anotação</button>

      <div id="aposse-block" class="aposse-block${data.owner===vendedor?' owned-me':data.owner?' owned-other':''}" style="margin-top:24px">
        ${buildAposseBlock(data)}
      </div>

      <div style="margin-top:28px">
        <div class="section-title">Histórico de atividades</div>
        <div id="activity-list">${activity}</div>
      </div>
    `;
  };

  // ── WhatsApp block ──
  const WA_SVG = `<svg class="wa-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.529 5.845L.057 23.143a.75.75 0 00.916.916l5.298-1.472A11.953 11.953 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.504-5.23-1.385l-.374-.217-3.882 1.079 1.08-3.88-.218-.374A10 10 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

  function buildWABlock(lead, data) {
    const d = limparTel(lead.telefone);
    if (!d) return `<div><div class="wa-label">WhatsApp</div><div class="wa-status no-phone">Sem telefone</div></div><button class="wa-btn disabled" disabled>${WA_SVG} Sem telefone</button>`;
    if (!isCelular(lead.telefone)) return `<div><div class="wa-label">WhatsApp</div><div class="wa-status landline">Telefone fixo — sem WhatsApp</div></div><button class="wa-btn disabled" disabled>${WA_SVG} Fixo</button>`;
    if (data.whatsapp) return `<div><div class="wa-label">WhatsApp</div><div class="wa-status confirmed">✓ Confirmado — ${lead.telefone}</div></div><div class="wa-actions"><label class="wa-toggle"><input type="checkbox" checked onchange="toggleWhatsapp(this.checked)"> Tem WhatsApp</label><a class="wa-btn" href="${waURL(lead.telefone)}" target="_blank">${WA_SVG} Abrir conversa</a></div>`;
    return `<div><div class="wa-label">WhatsApp</div><div class="wa-status pending">Celular detectado — confirme se tem WhatsApp</div></div><div class="wa-actions"><label class="wa-toggle"><input type="checkbox" onchange="toggleWhatsapp(this.checked)"> Tem WhatsApp</label><button class="wa-btn disabled" disabled>${WA_SVG} Abrir conversa</button></div>`;
  }

  // ── Aposse block ──
  function buildAposseBlock(data) {
    if (data.owner === vendedor) {
      return `<div class="aposse-info"><div class="ap-label">Responsável pelo lead</div><div class="ap-status mine">✓ Você é o responsável</div></div><button class="aposse-btn" style="background:#EF4444" onclick="liberarLead()">Liberar lead</button>`;
    }
    if (data.owner) {
      return `<div class="aposse-info"><div class="ap-label">Responsável pelo lead</div><div class="ap-status other">Em posse de ${data.owner}</div></div><button class="aposse-btn" disabled>Lead ocupado</button>`;
    }
    const pode = rotinaConcluida(data);
    const hint = pode ? '' : '<div class="ap-hint">Complete: mude o status, informe a data e salve uma anotação</div>';
    return `<div class="aposse-info"><div class="ap-label">Responsável pelo lead</div><div class="ap-status free">Disponível — ninguém assumiu</div>${hint}</div><button class="aposse-btn" ${pode?'':'disabled'} onclick="apossarLead()">Assumir lead</button>`;
  }

  // ── Actions ──
  window.changeStatus = async function(newStatus) {
    if (!selectedId) return;
    const data = getCRM(selectedId);
    const old = data.status;
    const activity = [...(data.activity||[]), { status: newStatus, action: `${STATUS_LABELS[old]} → ${STATUS_LABELS[newStatus]}`, vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { status: newStatus, activity });
  };

  window.saveNextContact = async function(val) {
    if (!selectedId) return;
    const data = getCRM(selectedId);
    const activity = [...(data.activity||[]), { action: 'Data de contato definida', note: formatDate(val), vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { nextContact: val, activity });
    document.getElementById('nc-block')?.classList.toggle('required', !val);
  };

  window.saveNotes = async function() {
    if (!selectedId) return;
    const ta = document.getElementById('notes-ta');
    const data = getCRM(selectedId);
    const preview = ta.value.slice(0,60) + (ta.value.length > 60 ? '…' : '');
    const activity = [...(data.activity||[]), { action: 'Anotação salva', note: preview, vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { notes: ta.value, activity });
    showToast('Anotação salva', 'ok');
  };

  window.toggleWhatsapp = async function(checked) {
    if (!selectedId) return;
    const data = getCRM(selectedId);
    const activity = [...(data.activity||[]), { action: checked ? 'WhatsApp confirmado' : 'WhatsApp desmarcado', vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { whatsapp: checked, activity });
  };

  window.apossarLead = async function() {
    if (!selectedId) return;
    const data = getCRM(selectedId);
    if (data.owner) return showToast('Este lead já foi assumido por ' + data.owner);
    const activity = [...(data.activity||[]), { action: 'Lead assumido', note: vendedor, vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { owner: vendedor, activity });
    showToast('Você assumiu este lead!', 'ok');
  };

  window.liberarLead = async function() {
    if (!selectedId) return;
    const data = getCRM(selectedId);
    const activity = [...(data.activity||[]), { action: 'Lead liberado', vendedor, ts: Date.now() }];
    await saveCRM(selectedId, { owner: '', activity });
    showToast('Lead liberado');
  };

  // ── File import ──
  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const parsed = parseCSV(ev.target.result);
      const obj = {};
      parsed.forEach(l => { obj[l._id] = l; });
      await set(ref(db, 'leads'), obj);
      showToast(parsed.length + ' leads importados!', 'ok');
    };
    reader.readAsText(file, 'utf-8');
  });

  document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; renderList(); });
  document.getElementById('filter-row').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn'); if (!btn) return;
    filterStatus = btn.dataset.status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderList();
  });
</script>
